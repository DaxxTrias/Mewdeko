rolegreetlist:
  args:
    - ''
  desc: >-
    Lists all role greets set up in the guild, providing detailed information for
    each.
  params: [ ]
rolegreetmessage:
  args:
    - '<id> [message]'
    - number
  desc: >-
    Updates the message content of a role greet. If no message is provided,
    presents options to preview the message as is or view it as regular text.
  params:
    - desc: 'The ID of the role greet to update, based on its position in the list of all role greets.'
      name: id
      optional: false
      type: int
    - desc: 'The new message content. Optional.'
      name: message
      optional: true
      type: string
