rolegreetadd:
  args:
    - '@role [@channel]'
    - '@role'
  desc: >-
    Adds a new role greet message for a specified role. If no channel is
    specified, the current channel is used.
  params:
    - desc: 'The role for which the greet message is being set.'
      name: role
      optional: false
      type: role
    - desc: 'The text channel where the greet message will be sent. Optional.'
      name: channel
      optional: true
      type: channel
