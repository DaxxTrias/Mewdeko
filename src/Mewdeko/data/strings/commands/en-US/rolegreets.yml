rolegreetwebhook:
  args:
    - '<id> [name] [avatar]'
    - number
  desc: >-
    Configures a webhook for a role greet message, allowing for custom name and
    avatar. If no name is provided, the webhook is disabled.
  params:
    - desc: 'The ID of the role greet to configure the webhook for, based on its position in the list of all role greets.'
      name: id
      optional: false
      type: int
    - desc: 'The name of the webhook. Optional.'
      name: name
      optional: true
      type: string
    - desc: 'The URL of the avatar for the webhook. Optional.'
      name: avatar
      optional: true
      type: string
