    - desc: The role to be assigned to users who match patterns.
      name: role
      optional: false
      type: IRole
patternadd:
  args:
    - '<pattern> [name] [checkUsername] [checkDisplayName]'
    - pattern
  desc: 'Adds a regex pattern to the Anti-Pattern protection.'
  params:
    - desc: The regex pattern to match against usernames/display names.
      name: pattern
      optional: false
      type: string
    - desc: Optional name for the pattern.
      name: name
      optional: true
      type: string
    - desc: Whether to check usernames against this pattern (default true).
      name: checkUsername
      optional: true
      type: bool
    - desc: Whether to check display names against this pattern (default true).
      name: checkDisplayName
      optional: true
      type: bool
patternremove:
  args:
    - number
  desc: 'Removes a pattern from the Anti-Pattern protection.'
  params:
    - desc: The ID of the pattern to remove.
      name: patternId
      optional: false
      type: int
