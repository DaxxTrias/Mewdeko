antipattern_PunishmentAction_=:
  args:
    - '<action> [punishTime]'
    - action
  desc: >-
    Configures the Anti-Pattern protection for the guild, setting the punishment
    action with a role-based punishment.
  params:
    - desc: The punishment action to be taken against detected pattern matches.
      name: action
      optional: false
      type: PunishmentAction
    - desc: 'The duration of the punishment, if applicable.'
      name: punishTime
      optional: true
      type: StoopidTime
