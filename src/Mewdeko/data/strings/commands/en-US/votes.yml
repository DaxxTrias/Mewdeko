votes:
  args:
    - '[@user]'
  desc: >-
    Displays the total number of votes cast by a specific user or the command
    invoker.
  params:
    - desc: 'The user whose votes to count. If null, counts votes for the command invoker.'
      name: user
      optional: true
      type: user
