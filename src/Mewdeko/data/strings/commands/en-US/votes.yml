votechannel:
  args:
    - channel
  desc: >-
    Sets the specified text channel as the vote channel where all vote
    confirmations will be sent.
  params:
    - &ref_646
      desc: 'The text channel to set as the vote channel.'
      name: channel
      optional: false
      type: ITextChannel
