votemessage:
  args:
    - '[message]'
  desc: >-
    Sets a custom message to be sent when a user votes or previews the current
    vote message.
  params:
    - desc: 'The custom message to set for votes. Use "-" to reset to the default message. If null, previews the current vote message.'
      name: message
      optional: true
      type: string
votepassword:
  args:
    - ''
  desc: >-
    Initiates a confirmation process for setting a new vote password, cautioning
    the user about its security.
  params: [ ]
voteroleadd:
  args:
    - '@role [time]'
    - '@role'
  desc: >-
    Adds a role to be granted to users when they vote, with an optional duration
    for the role to be automatically removed.
  params:
    - desc: 'The role to add as a vote reward.'
      name: role
      optional: false
      type: role
    - desc: 'The duration for which the role will be granted. Null for indefinite.'
      name: time
      optional: true
      type: duration
