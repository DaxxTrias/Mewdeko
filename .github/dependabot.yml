version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps"
    groups:
      discord:
        patterns:
          - "Discord.*"
          - "Lavalink4NET.*"
        update-types:
          - "minor"
          - "patch"
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
        update-types:
          - "minor"
          - "patch"
      google:
        patterns:
          - "Google.*"
        update-types:
          - "minor"
          - "patch"
      serilog:
        patterns:
          - "Serilog*"
        update-types:
          - "minor"
          - "patch"
      sentry:
        patterns:
          - "Sentry*"
        update-types:
          - "minor"
          - "patch"
      skia:
        patterns:
          - "SkiaSharp*"
          - "HarfBuzzSharp*"
        update-types:
          - "minor"
          - "patch"
      tests:
        patterns:
          - "NUnit*"
          - "coverlet.*"
        update-types:
          - "minor"
          - "patch"
      analyzers:
        patterns:
          - "*.Analyzers"
          - "Microsoft.CodeAnalysis.*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
